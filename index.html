<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>С 8 Марта!</title>
  <meta name="description" content="Поздравление с 8 марта" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg" aria-hidden="true"></div>
  <div class="tulips" id="tulips" aria-hidden="true"></div>

  <main class="card" role="main">
    <div class="badge">8&nbsp;МАРТА</div>
    <h1 id="title">Дорогая!</h1>

    <p class="poem" id="poem">
      Пусть март приносит нежность и тепло,<br>
      Пусть будет в сердце солнечно, светло.<br>
      Пусть сбудутся мечты — без суеты,<br>
      А рядом будут радость и цветы.
    </p>

    <div class="meta">
      <div class="hint">Можно передать имя параметром:</div>
      <code class="code">?name=Катя</code>
    </div>

    <div class="actions">
      <button id="copy" class="btn">Скопировать ссылку с именем</button>
      <a id="open" class="btn btn-ghost" href="#">Открыть пример</a>
    </div>

    <footer class="footer">
      Сделано специально под Windows‑вайб и падающие тюльпаны.
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
