<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>С 8 Марта!</title>
  <meta name="description" content="Поздравление с 8 марта" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg" aria-hidden="true"></div>
  <div class="tulips" id="tulips" aria-hidden="true"></div>

  <div class="hud" aria-hidden="false">
    <div class="score">Очки: <span id="score">0</span></div>
    <button id="toggle" class="btn btn-small" type="button">Скрыть поздравление</button>
  </div>

  <main class="card" role="main" id="card">
    <div class="badge">8&nbsp;МАРТА</div>
    <h1 id="title">Дорогая!</h1>

    <p class="poem" id="poem">
      Пусть март приносит нежность и тепло,<br>
      Пусть будет в сердце солнечно, светло.<br>
      Пусть сбудутся мечты — без суеты,<br>
      А рядом будут радость и цветы.
    </p>

    <!-- controls removed -->
  </main>

  <script src="script.js"></script>
</body>
</html>
